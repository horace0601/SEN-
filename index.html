<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEN 考試時間計算機 (四大考場版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 30px 10px;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 1200px;
            width: 100%;
        }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        h3 { border-bottom: 2px solid #3498db; padding-bottom: 5px; color: #2980b9; margin-top: 30px;}
        .note { font-size: 0.85em; color: #7f8c8d; margin-bottom: 10px; line-height: 1.5; }
        .highlight-note { color: #e67e22; font-weight: bold; }
        
        input[type="time"], input[type="number"], input[type="text"], input[type="date"], select {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit;
        }
        button {
            padding: 8px 12px; background-color: #3498db; color: white; border: none; border-radius: 5px;
            font-size: 14px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background-color: #2980b9; }
        .btn-danger { background-color: #e74c3c; padding: 5px 10px; font-size: 13px; }
        .btn-danger:hover { background-color: #c0392b; }
        .btn-success { background-color: #2ecc71; width: 100%; margin-top: 30px; font-size: 18px; padding: 15px; font-weight: bold;}
        .btn-success:hover { background-color: #27ae60; }
        .btn-export { background-color: #9b59b6; margin-top: 15px; width: 100%; display: none; padding: 12px; font-size: 16px; font-weight: bold;}
        .btn-export:hover { background-color: #8e44ad; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; vertical-align: middle; }
        th { background-color: #f8f9fa; }
        .checkbox-cell { text-align: center; }
        
        #resultContainer {
            margin-top: 30px; padding: 20px; background-color: #fff;
            border: 2px dashed #1abc9c; border-radius: 8px; display: none;
        }
        
        /* 考場區塊樣式 */
        .room-section { margin-bottom: 40px; border: 2px solid #bdc3c7; border-radius: 8px; overflow: hidden; }
        .room-title { background-color: #34495e; color: white; padding: 15px; margin: 0; font-size: 1.3em; text-align: center; letter-spacing: 2px; }
        .room-title.stt { background-color: #8e44ad; }
        .room-title.listening { background-color: #d35400; }
        .room-title.senior { background-color: #2980b9; }
        .room-title.junior { background-color: #27ae60; }
        
        .date-group { padding: 15px; }
        .date-header { background-color: #ecf0f1; color: #2c3e50; padding: 8px 12px; border-left: 5px solid #34495e; font-weight: bold; margin-bottom: 10px; font-size: 1.1em;}
        .break-list { margin: 0; padding-left: 20px; text-align: left; font-size: 0.85em; color: #555; }
        .highlight-time { color:#e74c3c; font-weight:bold; font-size:1.1em; }
        .latest-time-container { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; background: #fff3f3; padding: 10px 15px; border-radius: 5px; border: 1px solid #fadbd8; }
        .latest-time { font-weight: bold; color: #c0392b; font-size: 1.1em; }
        .duration-time { font-weight: bold; color: #2980b9; font-size: 1.1em; }
        .no-exam { padding: 20px; text-align: center; color: #7f8c8d; font-style: italic; }
        
        .grand-total { background-color: #f1c40f; color: #2c3e50; padding: 20px; text-align: center; font-size: 1.5em; font-weight: bold; border-radius: 8px; margin-top: 30px; border: 2px solid #f39c12; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
    </style>
</head>
<body>

<div class="container">
    <h2>SEN 考試時間計算機 (四大考場自動分流版)</h2>
    
    <h3>1. 考試科目設定</h3>
    <p class="note">💡 提示：輸入各科的考試日期、年級及開考時間。若包含「英文卷三」或「聆聽」，系統會自動將該科排入聆聽室。</p>
    <table id="examTable">
        <thead>
            <tr>
                <th style="width: 15%;">日期</th>
                <th style="width: 10%;">年級</th>
                <th style="width: 25%;">科目名稱</th>
                <th style="width: 15%;">正常時長(分鐘)</th>
                <th style="width: 15%;">開考時間</th>
                <th style="width: 10%;">操作</th>
            </tr>
        </thead>
        <tbody id="examBody">
            <tr>
                <td><input type="date" class="ex-date" required></td>
                <td><select class="ex-grade"><option value="中四" selected>中四</option><option value="中一">中一</option><option value="中二">中二</option><option value="中三">中三</option><option value="中五">中五</option><option value="中六">中六</option></select></td>
                <td><input type="text" class="ex-subject" value="英文卷三"></td>
                <td><input type="number" class="ex-duration" value="120" min="1"></td>
                <td><input type="time" class="ex-start" value="08:30"></td>
                <td><button type="button" class="btn-danger" onclick="removeRow(this)">刪除</button></td>
            </tr>
            <tr>
                <td><input type="date" class="ex-date" required></td>
                <td><select class="ex-grade"><option value="中二" selected>中二</option><option value="中一">中一</option><option value="中三">中三</option><option value="中四">中四</option><option value="中五">中五</option><option value="中六">中六</option></select></td>
                <td><input type="text" class="ex-subject" value="地理"></td>
                <td><input type="number" class="ex-duration" value="75" min="1"></td>
                <td><input type="time" class="ex-start" value="10:30"></td>
                <td><button type="button" class="btn-danger" onclick="removeRow(this)">刪除</button></td>
            </tr>
        </tbody>
    </table>
    <button type="button" style="margin-top: 10px;" onclick="addExamRow()">+ 新增一科考試</button>

    <h3>2. SEN 考生名單設定</h3>
    <p class="note">
        💡 <span class="highlight-note">【語音輸入功能】</span>：若剔選「語音輸入」，且該生應考合資格科目，系統會自動分流至「語音輸入室」。<br>
        💡 若科目結束時間相同，同科目的考生會自動合併在同一行顯示。
    </p>
    <table id="studentTable">
        <thead>
            <tr>
                <th style="width: 9%;">年級</th>
                <th style="width: 15%;">考生姓名</th>
                <th style="width: 20%;">選修科 (留空=全考)</th>
                <th style="width: 10%;">加時(%)</th>
                <th style="width: 8%;">小休</th>
                <th style="width: 10%;">語音輸入</th>
                <th style="width: 8%;">操作</th>
            </tr>
        </thead>
        <tbody id="studentBody">
            <tr>
                <td><select class="stu-grade"><option value="中四" selected>中四</option><option value="中一">中一</option><option value="中二">中二</option><option value="中三">中三</option><option value="中五">中五</option><option value="中六">中六</option><option value="全部">全部(通用)</option></select></td>
                <td><input type="text" class="stu-name" value="陳大文"></td>
                <td><input type="text" class="stu-subjects" value=""></td>
                <td><input type="number" class="stu-extra" value="25" min="0"></td>
                <td class="checkbox-cell"><input type="checkbox" class="stu-break" checked></td>
                <td class="checkbox-cell"><input type="checkbox" class="stu-stt"></td>
                <td><button type="button" class="btn-danger" onclick="removeRow(this)">刪除</button></td>
            </tr>
            <tr>
                <td><select class="stu-grade"><option value="中二" selected>中二</option><option value="中一">中一</option><option value="中三">中三</option><option value="中四">中四</option><option value="中五">中五</option><option value="中六">中六</option><option value="全部">全部(通用)</option></select></td>
                <td><input type="text" class="stu-name" value="李小明"></td>
                <td><input type="text" class="stu-subjects" value=""></td>
                <td><input type="number" class="stu-extra" value="25" min="0"></td>
                <td class="checkbox-cell"><input type="checkbox" class="stu-break" checked></td>
                <td class="checkbox-cell"><input type="checkbox" class="stu-stt" checked></td>
                <td><button type="button" class="btn-danger" onclick="removeRow(this)">刪除</button></td>
            </tr>
        </tbody>
    </table>
    <button type="button" style="margin-top: 10px;" onclick="addStudentRow()">+ 新增一位考生</button>
    
    <button type="button" class="btn-success" onclick="calculateAll()">一鍵產生四大考場時間表</button>

    <div id="resultContainer">
        <h2 style="border-bottom: none; margin-bottom: 20px;">SEN 考場分佈總表</h2>
        <div id="reportContent">
            </div>
    </div>

    <button type="button" id="exportBtn" class="btn-export" onclick="exportToImage()">📥 將總表匯出成圖片 (PNG)</button>
</div>

<script>
    // 預設日期
    document.addEventListener("DOMContentLoaded", () => {
        const today = new Date().toISOString().split('T')[0];
        document.querySelectorAll('.ex-date').forEach(input => input.value = today);
    });

    function addExamRow() {
        const tbody = document.getElementById('examBody');
        const tr = document.createElement('tr');
        const today = new Date().toISOString().split('T')[0];
        tr.innerHTML = `
            <td><input type="date" class="ex-date" value="${today}" required></td>
            <td><select class="ex-grade"><option value="中一">中一</option><option value="中二">中二</option><option value="中三">中三</option><option value="中四">中四</option><option value="中五">中五</option><option value="中六">中六</option></select></td>
            <td><input type="text" class="ex-subject" placeholder="例: 中文卷一"></td>
            <td><input type="number" class="ex-duration" value="90" min="1"></td>
            <td><input type="time" class="ex-start" value="08:30"></td>
            <td><button type="button" class="btn-danger" onclick="removeRow(this)">刪除</button></td>
        `;
        tbody.appendChild(tr);
    }

    function addStudentRow() {
        const tbody = document.getElementById('studentBody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><select class="stu-grade"><option value="中一">中一</option><option value="中二">中二</option><option value="中三">中三</option><option value="中四">中四</option><option value="中五">中五</option><option value="中六">中六</option><option value="全部">全部(通用)</option></select></td>
            <td><input type="text" class="stu-name" placeholder="例: 張三"></td>
            <td><input type="text" class="stu-subjects" placeholder="關鍵字(逗號分隔)"></td>
            <td><input type="number" class="stu-extra" value="25" min="0"></td>
            <td class="checkbox-cell"><input type="checkbox" class="stu-break" checked></td>
            <td class="checkbox-cell"><input type="checkbox" class="stu-stt"></td>
            <td><button type="button" class="btn-danger" onclick="removeRow(this)">刪除</button></td>
        `;
        tbody.appendChild(tr);
    }

    function removeRow(btn) { btn.closest('tr').remove(); }

    const parseTime = (timeStr) => { const [h, m] = timeStr.split(':').map(Number); return h * 60 + m; };
    const formatTime = (mins) => {
        let h = Math.floor(mins / 60) % 24; if (h < 0) h += 24;
        const m = ((mins % 60) + 60) % 60;
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    };

    // 判斷是否符合語音輸入資格
    function isSTTEligible(subject, examGrade) {
        const juniorSTT = ['公經濟社', '生社', '中史', '地理', '歷史'];
        const seniorSTT = ['健社', '中史', '公民', '地理', '視藝', '歷史'];
        const isJunior = ['中一', '中二', '中三'].includes(examGrade);
        const isSenior = ['中四', '中五', '中六'].includes(examGrade);

        if (isJunior) return juniorSTT.some(kw => subject.includes(kw));
        if (isSenior) return seniorSTT.some(kw => subject.includes(kw));
        return false;
    }

    function calculateAll() {
        const examRows = document.getElementById('examBody').getElementsByTagName('tr');
        let exams = [];
        for (let row of examRows) {
            const date = row.querySelector('.ex-date').value;
            const grade = row.querySelector('.ex-grade').value;
            const subject = row.querySelector('.ex-subject').value || '未命名科目';
            const duration = parseInt(row.querySelector('.ex-duration').value);
            const startTime = row.querySelector('.ex-start').value;
            if (!date || !duration || !startTime) { alert("請確保所有考試資料已填寫！"); return; }
            exams.push({ date, grade, subject, duration, startTime, startMins: parseTime(startTime) });
        }

        const studentRows = document.getElementById('studentBody').getElementsByTagName('tr');
        let students = [];
        for (let row of studentRows) {
            const subjectsStr = row.querySelector('.stu-subjects').value.trim();
            students.push({
                grade: row.querySelector('.stu-grade').value,
                name: row.querySelector('.stu-name').value || '未命名考生',
                subjectKeywords: subjectsStr.split(/[,，]/).map(s => s.trim()).filter(s => s !== ""),
                extraPct: parseFloat(row.querySelector('.stu-extra').value) || 0,
                needsBreak: row.querySelector('.stu-break').checked,
                useSTT: row.querySelector('.stu-stt').checked
            });
        }

        if (exams.length === 0 || students.length === 0) { alert("請確保已新增考試和考生！"); return; }

        let allAssignments = [];

        exams.forEach(exam => {
            students.forEach(stu => {
                if (stu.grade !== exam.grade && stu.grade !== '全部') return;
                if (stu.subjectKeywords.length > 0 && !stu.subjectKeywords.some(kw => exam.subject.includes(kw))) return;

                const extraTime = Math.ceil(exam.duration * (stu.extraPct / 100));
                let remainingWorkTime = exam.duration + extraTime;
                let currentTime = exam.startMins;
                let breaksHtml = "";

                if (stu.needsBreak && exam.duration >= 90) {
                    let breakCount = 1;
                    breaksHtml += `<ul class="break-list">`;
                    while (remainingWorkTime > 45) {
                        currentTime += 45; remainingWorkTime -= 45;
                        const breakStart = formatTime(currentTime);
                        currentTime += 5;
                        const breakEnd = formatTime(currentTime);
                        breaksHtml += `<li>${breakStart}-${breakEnd}</li>`;
                        breakCount++;
                    }
                    breaksHtml += `</ul>`;
                } else {
                    breaksHtml = `<span style="color:#7f8c8d;">無</span>`;
                }

                currentTime += remainingWorkTime;
                const endMins = currentTime;
                const finalEndTime = formatTime(endMins);

                let room = '';
                if (exam.subject.includes('英文卷三') || exam.subject.includes('聆聽')) {
                    room = '聆聽室';
                } else if (stu.useSTT && isSTTEligible(exam.subject, exam.grade)) {
                    room = '語音輸入室';
                } else if (['中一', '中二', '中三'].includes(exam.grade)) {
                    room = '初中特別室';
                } else {
                    room = '高中特別室';
                }

                allAssignments.push({
                    room, date: exam.date, grade: exam.grade, subject: exam.subject,
                    startMins: exam.startMins, startTime: exam.startTime,
                    endMins, finalEndTime,
                    stuName: stu.name, extraPct: stu.extraPct, breaksHtml
                });
            });
        });

        // 渲染報告
        const roomsToRender = [
            { id: '高中特別室', class: 'senior' },
            { id: '初中特別室', class: 'junior' },
            { id: '語音輸入室', class: 'stt' },
            { id: '聆聽室', class: 'listening' }
        ];

        const reportContent = document.getElementById('reportContent');
        reportContent.innerHTML = '';
        
        let grandTotalMinutes = 0; // 記錄整個考試期的總分鐘數

        roomsToRender.forEach(roomObj => {
            const roomName = roomObj.id;
            const roomRecords = allAssignments.filter(a => a.room === roomName);
            
            let html = `<div class="room-section">`;
            html += `<h3 class="room-title ${roomObj.class}">📍 ${roomName}</h3>`;

            if (roomRecords.length === 0) {
                html += `<div class="no-exam">本日無考生編排至此考場</div></div>`;
                reportContent.innerHTML += html;
                return;
            }

            const dates = [...new Set(roomRecords.map(r => r.date))].sort();
            
            dates.forEach(date => {
                html += `<div class="date-group">`;
                html += `<div class="date-header">📅 日期：${date}</div>`;
                
                let dayRecords = roomRecords.filter(r => r.date === date);
                
                // 排序：先按結束時間，再按年級，再按開始時間
                dayRecords.sort((a, b) => {
                    if (a.endMins !== b.endMins) return a.endMins - b.endMins;
                    if (a.grade !== b.grade) return a.grade.localeCompare(b.grade);
                    return a.startMins - b.startMins;
                });

                // ⭐ 運算重疊區間以計算當日實際運作分鐘數 ⭐
                let timeIntervals = dayRecords.map(r => ({ start: r.startMins, end: r.endMins }));
                // 必須先按開始時間排序才能正確合併區間
                timeIntervals.sort((a, b) => a.start - b.start);
                
                let mergedIntervals = [];
                for (let interval of timeIntervals) {
                    if (mergedIntervals.length === 0) {
                        mergedIntervals.push({ start: interval.start, end: interval.end });
                    } else {
                        let lastMerged = mergedIntervals[mergedIntervals.length - 1];
                        if (interval.start <= lastMerged.end) {
                            // 有重疊，延長結束時間
                            lastMerged.end = Math.max(lastMerged.end, interval.end);
                        } else {
                            // 無重疊，新增獨立區間
                            mergedIntervals.push({ start: interval.start, end: interval.end });
                        }
                    }
                }
                
                // 計算合併後的總分鐘數
                let dailyRoomTotalMins = mergedIntervals.reduce((sum, intv) => sum + (intv.end - intv.start), 0);
                grandTotalMinutes += dailyRoomTotalMins; // 累加至總時數

                // 合併同班同學顯示
                let mergedRecords = [];
                dayRecords.forEach(r => {
                    let existing = mergedRecords.find(m => m.grade === r.grade && m.subject === r.subject && m.endMins === r.endMins && m.breaksHtml === r.breaksHtml && m.startTime === r.startTime);
                    if (existing) {
                        existing.names.push(r.stuName);
                        if (!existing.extraPcts.includes(r.extraPct)) existing.extraPcts.push(r.extraPct);
                    } else {
                        mergedRecords.push({ ...r, names: [r.stuName], extraPcts: [r.extraPct] });
                    }
                });

                html += `<table>
                    <thead><tr><th style="width:10%">年級</th><th style="width:20%">科目</th><th style="width:25%">考生</th><th style="width:10%">加時</th><th style="width:10%">開考時間</th><th style="width:10%">結束時間</th><th style="width:15%">中途小休</th></tr></thead>
                    <tbody>`;
                
                let maxEndMins = 0;

                mergedRecords.forEach(m => {
                    if (m.endMins > maxEndMins) maxEndMins = m.endMins;
                    const extraStr = m.extraPcts.length === 1 ? `+${m.extraPcts[0]}%` : `各異`;
                    html += `<tr>
                        <td><strong>${m.grade}</strong></td>
                        <td>${m.subject}</td>
                        <td><strong>${m.names.join(' , ')}</strong></td>
                        <td>${extraStr}</td>
                        <td>${m.startTime}</td>
                        <td class="highlight-time">${m.finalEndTime}</td>
                        <td>${m.breaksHtml}</td>
                    </tr>`;
                });
                
                html += `</tbody></table>`;
                
                // 顯示最遲結束時間與當日總運作時數
                html += `<div class="latest-time-container">
                            <span class="duration-time">⏳ 當日考場運作時數：${dailyRoomTotalMins} 分鐘</span>
                            <span class="latest-time">⏱ 當日最遲結束時間：${formatTime(maxEndMins)}</span>
                         </div>`;
                html += `</div>`; 
            });

            html += `</div>`; 
            reportContent.innerHTML += html;
        });

        // ⭐ 在所有考場報表的最下方，顯示總運作時數 ⭐
        if (grandTotalMinutes > 0) {
            let grandHtml = `<div class="grand-total">
                🌟 整個考試期（所有特別考場）總運作時數：${grandTotalMinutes} 分鐘
            </div>`;
            reportContent.innerHTML += grandHtml;
        }

        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('exportBtn').style.display = 'block';
    }

    function exportToImage() {
        const resultDiv = document.getElementById('resultContainer');
        const exportBtn = document.getElementById('exportBtn');
        const originalText = exportBtn.innerText;
        exportBtn.innerText = "⏳ 處理中..."; exportBtn.disabled = true;
        window.scrollTo(0, 0);

        html2canvas(resultDiv, { scale: 2, backgroundColor: "#ffffff" }).then(canvas => {
            const link = document.createElement('a');
            link.download = `SEN考場分佈表_${new Date().toISOString().split('T')[0]}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            exportBtn.innerText = originalText; exportBtn.disabled = false;
        }).catch(err => {
            alert("匯出失敗，請重試。"); exportBtn.innerText = originalText; exportBtn.disabled = false;
        });
    }
</script>

</body>
</html>
